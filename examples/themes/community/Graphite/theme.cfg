toolbar:						Raised Bevel1 Solid
toolbar.color:					#ecedee
toolbar.textColor:				#505050

toolbar.button:					Flat Solid 
toolbar.button.color:			#ecedee
toolbar.button.picColor:		#505050

toolbar.button.pressed:			Sunken Bevel1 Solid 
toolbar.button.pressed.color:	#ecedee

toolbar.clock:					Flat Solid
toolbar.clock.color:			#ecedee
toolbar.clock.textColor:		#505050

toolbar.label:					Flat Solid
toolbar.label.color:			#ecedee
toolbar.label.textColor:		#505050

toolbar.windowLabel:			Flat Solid
toolbar.windowLabel.color:		#ecedee
toolbar.windowLabel.textColor:	#505050

toolbar.justify:				center

menu.title:						Raised Bevel1 Solid
menu.title.color:				#505050
menu.title.textColor:			#ecedee
menu.title.justify:				center

menu.frame:						Raised Bevel1 Solid
menu.frame.color:				#ecedee
menu.frame.textColor:			#505050
menu.frame.justify:				Left

menu.hilite:					Raised Bevel1 Solid
menu.hilite.color:				#505050
menu.hilite.textColor:			#ecedee

menu.bullet:					Diamond
menu.bullet.position:			Right


window.title.focus:				Raised Bevel1 Solid
window.title.focus.color:		#505050
window.title.unfocus:			Raised Bevel1 Solid
window.title.unfocus.color:		#ecedee

window.label.focus:				Flat Solid
window.label.focus.color:		#505050
window.label.focus.textColor:	#ecedee
window.label.unfocus:			Flat Solid
window.label.unfocus.color:		#ecedee
window.label.unfocus.textColor:	#505050

window.button.focus:			Flat Solid
window.button.focus.color:		#505050
window.button.focus.picColor:	#ecedee
window.button.unfocus:			Flat Solid
window.button.unfocus.color:	#ecedee
window.button.unfocus.picColor:	#505050
window.button.pressed:			Sunken Bevel1 Solid
window.button.pressed.color:	#505050

window.handle.focus:			Raised Bevel1 Solid
window.handle.focus.color:		#505050
window.handle.unfocus:			Raised Bevel1 Solid
window.handle.unfocus.color:	#ecedee

window.grip.focus:				Raised Bevel1 Solid
window.grip.focus.color:		#505050
window.grip.unfocus:			Raised Bevel1 Solid
window.grip.unfocus.color:		#ecedee

window.justify:					center

borderColor:					#000000

bevelWidth:						2
borderWidth:					1
handleWidth:					5

background:	           		    mod
background.modX:				4
background.modY:				4
background.color:				#202020
background.colorTo:				#101010

*Font:	                        DeJavu Sans-9
